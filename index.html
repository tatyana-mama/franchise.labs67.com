<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#BA7517;--gd:#9A6010;--gl:#D4A44A;
  --bk:#0A0A0F;--wh:#fff;--cr:#F8F9FA;
  --g1:#E9ECEF;--g2:#DEE2E6;--tx:#1A1A2E;--mu:#6C757D;
  --fd:'Sora',sans-serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bk);color:var(--wh);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}

/* ═══ HERO ═══ */
#hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transition:all 0.5s}
#hero.off{flex:0;min-height:0;overflow:hidden;max-height:0;padding:0;opacity:0}
.hbg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 30%,rgba(186,117,23,0.05),transparent 70%);pointer-events:none}
.hgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.brand{text-align:center;position:relative;z-index:1;padding:40px 24px}
.brand-sub{font-family:var(--fm);font-size:10px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;opacity:0.6;margin-bottom:12px}
.brand-name{font-family:var(--fd);font-size:clamp(52px,14vw,130px);font-weight:700;letter-spacing:-2px;line-height:0.9;margin-bottom:10px}
.brand-mean{font-family:var(--fm);font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.25);text-transform:uppercase}
.brand-mean b{color:var(--gold);font-weight:400}
.brand-line{width:60px;height:2px;background:linear-gradient(90deg,var(--gold),var(--gl));margin:20px auto 16px}
.brand-desc{font-size:13px;color:rgba(255,255,255,0.35);max-width:380px;margin:0 auto;line-height:1.7;font-weight:300}

/* ═══ CANVAS — universal response area ═══ */
#canvas{flex:1;overflow-y:auto;display:none;padding-bottom:90px}
#canvas.on{display:block}
#canvas::-webkit-scrollbar{width:3px}
#canvas::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

/* FRAME — one response unit (can be anything) */
.frame{max-width:900px;margin:0 auto;padding:24px 24px 0;animation:frameIn 0.4s ease}
@keyframes frameIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.frame+.frame{border-top:1px solid rgba(255,255,255,0.04);margin-top:8px;padding-top:24px}

/* FRAME: query echo */
.frame-q{font-family:var(--fm);font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.15);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.frame-q::before{content:'';width:12px;height:1px;background:var(--gold);opacity:0.4}

/* FRAME: agent text */
.agent-msg{font-size:13px;line-height:1.8;color:rgba(255,255,255,0.55);font-weight:300;max-width:600px;margin-bottom:16px;padding-left:20px;border-left:2px solid rgba(186,117,23,0.2)}
.agent-msg strong{color:var(--gold);font-weight:500}
.agent-msg em{color:rgba(255,255,255,0.7);font-style:normal}

/* FRAME: block grid */
.grid{display:grid;gap:1px}
.g1{grid-template-columns:1fr}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}

/* CARD */
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);padding:24px 22px;transition:all 0.3s}
.card:hover{background:rgba(255,255,255,0.05);border-color:rgba(186,117,23,0.15)}
.card-badge{font-family:var(--fm);font-size:8px;letter-spacing:2px;padding:3px 8px;background:rgba(186,117,23,0.12);color:var(--gold);display:inline-block;margin-bottom:10px;text-transform:uppercase}
.card-title{font-family:var(--fd);font-size:16px;font-weight:600;color:var(--wh);margin-bottom:6px;letter-spacing:-0.3px}
.card-text{font-size:11px;line-height:1.7;color:rgba(255,255,255,0.35);font-weight:300;margin-bottom:12px}
.card-list{list-style:none;display:flex;flex-direction:column;gap:4px}
.card-list li{font-size:10px;color:rgba(255,255,255,0.45);display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.card-list li::before{content:'';width:4px;height:4px;background:var(--gold);flex-shrink:0;margin-top:5px;border-radius:1px}
.card-price{font-family:var(--fd);font-size:24px;font-weight:700;color:var(--gold);margin-bottom:2px}
.card-price-sub{font-size:10px;color:rgba(255,255,255,0.25);margin-bottom:4px;font-weight:300}
.card-royalty{font-family:var(--fm);font-size:10px;color:var(--gold);opacity:0.7;margin-bottom:8px}
.card-step{display:flex;gap:10px;margin-bottom:12px}
.card-step:last-child{margin-bottom:0}
.card-step-n{font-family:var(--fm);font-size:10px;color:var(--gold);width:20px;height:20px;border:1px solid rgba(186,117,23,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-step-t{font-family:var(--fd);font-size:12px;font-weight:600;color:var(--wh);margin-bottom:1px}
.card-step-d{font-size:10px;color:rgba(255,255,255,0.3);line-height:1.5}
.card-faq-q{font-family:var(--fd);font-size:12px;font-weight:600;color:var(--wh);margin-bottom:3px}
.card-faq-a{font-size:10px;color:rgba(255,255,255,0.3);line-height:1.6;margin-bottom:10px}
.card-faq-a:last-child{margin-bottom:0}
.card-contact{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.card-contact:last-child{border:none}
.card-contact span{font-size:14px}
.card-contact a{color:var(--wh);text-decoration:none;font-size:12px;transition:color 0.2s}
.card-contact a:hover{color:var(--gold)}

/* ═══ CHAT BAR (sticky bottom) ═══ */
#bar{position:sticky;bottom:0;z-index:50;background:rgba(10,10,15,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(186,117,23,0.08);padding:12px 24px 16px}
#bar.hero-mode{position:relative;background:transparent;border:none;backdrop-filter:none;max-width:640px;width:100%;margin:0 auto;padding:24px}
.chat-label{font-family:var(--fm);font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.15);text-transform:uppercase;margin-bottom:6px}
#bar:not(.hero-mode) .chat-label{display:none}
.chat-row{display:flex;border:1px solid rgba(255,255,255,0.08);transition:border-color 0.3s;max-width:700px;margin:0 auto}
.chat-row:focus-within{border-color:var(--gold)}
.chat-in{flex:1;background:transparent;border:none;outline:none;color:var(--wh);font-family:var(--fb);font-size:14px;font-weight:300;padding:12px 18px}
.chat-in::placeholder{color:rgba(255,255,255,0.12)}
.chat-go{width:44px;background:var(--gold);border:none;cursor:pointer;color:var(--bk);font-size:16px;transition:background 0.2s;flex-shrink:0}
.chat-go:hover{background:var(--gl)}
.sugs{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;max-width:700px;margin-left:auto;margin-right:auto;justify-content:center}
.sg{font-family:var(--fm);font-size:8px;letter-spacing:1px;padding:5px 10px;border:1px solid rgba(255,255,255,0.05);color:rgba(255,255,255,0.2);background:transparent;cursor:pointer;transition:all 0.15s;text-transform:uppercase}
.sg:hover{border-color:var(--gold);color:var(--gold)}

/* ═══ SHARE ═══ */
.share-row{display:none;align-items:center;justify-content:center;gap:12px;max-width:700px;margin:6px auto 0}
.share-row.on{display:flex}
.share-row span{font-family:var(--fm);font-size:8px;color:rgba(255,255,255,0.2);letter-spacing:1px;text-transform:uppercase}
.share-row button{font-family:var(--fm);font-size:8px;letter-spacing:1px;padding:4px 12px;background:rgba(186,117,23,0.2);color:var(--gold);border:1px solid rgba(186,117,23,0.2);cursor:pointer;text-transform:uppercase;transition:all 0.2s}
.share-row button:hover{background:var(--gold);color:var(--bk)}

/* ═══ THINKING DOTS ═══ */
.thinking{display:flex;gap:4px;padding:8px 0 8px 20px}
.thinking span{width:6px;height:6px;background:var(--gold);border-radius:50%;opacity:0.3;animation:dot 1s ease-in-out infinite}
.thinking span:nth-child(2){animation-delay:0.15s}
.thinking span:nth-child(3){animation-delay:0.3s}
@keyframes dot{0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:0.8;transform:scale(1.1)}}

/* ═══ PULSE NAV ═══ */
.pulse-nav{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:200;display:flex;flex-direction:column;align-items:flex-end;gap:0;padding:12px 8px;transition:all .3s}
.pulse-nav:hover{background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:16px 0 0 16px;padding:16px 14px;gap:4px}
.pn-item{display:flex;align-items:center;gap:10px;text-decoration:none;padding:6px 4px;pointer-events:none;opacity:.5;transition:all .3s}
.pulse-nav:hover .pn-item{pointer-events:auto;opacity:1}
.pn-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:transform .3s}
.pn-dot.active{box-shadow:0 0 8px currentColor}
.pn-label{font-family:var(--fm);font-size:10px;letter-spacing:1px;color:rgba(255,255,255,0.5);white-space:nowrap;max-width:0;overflow:hidden;transition:all .3s}
.pulse-nav:hover .pn-label{max-width:120px;color:rgba(255,255,255,0.8)}
.pn-divider{width:20px;height:1px;background:rgba(255,255,255,0.06);margin:2px 0;transition:opacity .3s;opacity:0}
.pulse-nav:hover .pn-divider{opacity:1}
.pn-pulse{width:6px;height:6px;border-radius:50%;background:var(--gold);margin:6px auto 2px;animation:pnPulse 2s ease-in-out infinite}
@keyframes pnPulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.pn-action{background:none;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .3s;margin-top:4px;opacity:0}
.pulse-nav:hover .pn-action{opacity:1}
.pn-action:hover{border-color:var(--gold);color:var(--gold)}

@media(max-width:700px){
  .g2,.g3{grid-template-columns:1fr}
  .brand-name{font-size:52px}
  .pulse-nav{display:none}
}
</style></head><body>

<div id="hero">
  <div class="hbg"></div>
  <div class="hgrid"></div>
  <div class="brand">
    <div class="brand-sub" data-t="brand_sub">канцэрн labs67</div>
    <div class="brand-name">LADZA</div>
    <div class="brand-mean"><b>L</b>abs <b>A</b>I <b>D</b>ental <b>Z</b>one — <b>A</b>utomated</div>
    <div class="brand-line"></div>
    <div class="brand-desc" data-t="brand_desc">Франшиза AI-клиник. Задайте вопрос — сайт соберётся под вас.</div>
  </div>
  <div class="lang-switcher" style="position:absolute;top:16px;right:16px;z-index:100"></div>
</div>

<div id="canvas"></div>

<div id="bar" class="hero-mode">
  <div class="chat-label" data-t="chat_label">задай вопрос — сайт появится</div>
  <div class="chat-row">
    <input class="chat-in" id="qi" type="text" placeholder="Хочу узнать про франшизу..." autofocus>

</div>

<script>
(function(){
  var SB='https://ctdleobjnzniqkqomlrq.supabase.co';
  var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0ZGxlb2JqbnpuaXFrcW9tbHJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzE4MTEsImV4cCI6MjA4NzgwNzgxMX0.AMHtY7zGPemKYCxMy2bqRTOEAp8trA_Slor9wmg7C38';

  var hero=document.getElementById('hero');
  var canvas=document.getElementById('canvas');
  var bar=document.getElementById('bar');
  var qi=document.getElementById('qi');
  var shareEl=document.getElementById('share');
  var loaded=[]; var cache={}; var sid=Math.random().toString(36).substr(2,8); var L='ru';

  /* Agent personality — responses by category */
  var agentIntros={
    formats:'Вот <strong>три формата</strong> партнёрства с LABS67. Каждый — это полностью готовая модель запуска AI-клиники.',
    prices:'Стоимость зависит от формата. Вот <strong>фиксированные условия</strong> — они не меняются.',
    conditions:'Вот <strong>ключевые условия</strong> партнёрства. Всё прозрачно — никаких скрытых пунктов.',
    tech:'Технологии — это то, что отличает нас от обычной франшизы. Вот <strong>что стоит внутри каждой клиники</strong>.',
    packages:'Полный <strong>комплект оборудования</strong> для запуска клиники.',
    process:'<strong>Пять шагов</strong> от заявки до открытия. Мы ведём на каждом этапе.',
    team:'За каждой клиникой стоит <strong>команда поддержки</strong> концерна.',
    faq:'Вот ответы на <strong>самые частые вопросы</strong>. Если вашего нет — напишите, я запомню.',
    contacts:'Вот как <strong>связаться</strong> с нами напрямую.'
  };

  var agentFollowups={
    formats:['сколько стоит','условия контракта','как начать'],
    prices:['условия контракта','оборудование','как начать'],
    conditions:['форматы франшизы','технологии AI','контакты'],
    tech:['оборудование клиники','форматы','цены'],
    packages:['технологии AI','цены','как начать'],
    process:['форматы','цены','контакты'],
    team:['процесс открытия','технологии','контакты'],
    faq:['форматы','цены','контакты'],
    contacts:['форматы','цены','процесс']
  };

  function api(t,p){return fetch(SB+'/rest/v1/'+t+'?'+p,{headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'}}).then(function(r){return r.json()})}
  function apiPost(t,d){fetch(SB+'/rest/v1/'+t,{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(d)})}
  function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
  function tx(o){return o[L]||o.en||o.be||''}

  /* ── SEARCH ── */
  function search(q){
    var w=q.toLowerCase().replace(/[^\wа-яёіўґє\s]/gi,'').split(/\s+/).filter(function(x){return x.length>1});
    if(!w.length) return Promise.resolve([]);
    var or=w.map(function(x){return 'keyword.ilike.*'+encodeURIComponent(x)+'*'}).join(',');
    return api('franchise_keywords','select=block_id,weight&or=('+or+')')
      .then(function(kws){
        if(!kws||!kws.length) return [];
        var sc={};kws.forEach(function(k){sc[k.block_id]=(sc[k.block_id]||0)+k.weight});
        var ids=Object.keys(sc).sort(function(a,b){return sc[b]-sc[a]}).slice(0,6);
        var f=ids.map(function(id){return 'id.eq.'+id}).join(',');
        return api('franchise_blocks','select=*&or=('+f+')&is_active=eq.true&order=category,sort_order');
      });
  }

  /* ── RENDER CARD ── */
  function renderCard(b){
    var m=b.meta||{};var h='<div class="card">';
    if(m.badge) h+='<div class="card-badge">'+esc(m.badge)+'</div>';
    h+='<div class="card-title">'+esc(tx(b.title))+'</div>';
    h+='<div class="card-text">'+esc(tx(b.content))+'</div>';
    if(m.price_from){
      h+='<div class="card-price">'+esc(m.price_from);
      if(m.price_to&&m.price_to!=='negotiable') h+=' — '+esc(m.price_to);
      h+='</div>';
      if(m.price_to==='negotiable') h+='<div class="card-price-sub">Индивидуальные условия</div>';
      if(m.royalty) h+='<div class="card-royalty">Роялти: '+esc(m.royalty)+'</div>';
      if(m.includes_note) h+='<div class="card-price-sub">'+esc(m.includes_note)+'</div>';
    }
    ['includes','items','specs','roles','points'].forEach(function(k){
      if(m[k]){h+='<ul class="card-list">';m[k].forEach(function(i){h+='<li>'+esc(i)+'</li>'});h+='</ul>'}
    });
    if(m.steps) m.steps.forEach(function(s){
      h+='<div class="card-step"><div class="card-step-n">'+esc(s.num)+'</div><div><div class="card-step-t">'+esc(s.title)+'</div><div class="card-step-d">'+esc(s.desc)+'</div></div></div>';
    });
    if(m.questions) m.questions.forEach(function(q){
      h+='<div class="card-faq-q">'+esc(q.q)+'</div><div class="card-faq-a">'+esc(q.a)+'</div>';
    });
    if(m.phone){
      h+='<div class="card-contact"><span>&#128222;</span><a href="tel:'+esc(m.phone)+'">'+esc(m.phone)+'</a></div>';
      h+='<div class="card-contact"><span>&#9993;</span><a href="mailto:'+esc(m.email)+'">'+esc(m.email)+'</a></div>';
      if(m.telegram) h+='<div class="card-contact"><span>&#9992;</span><a href="https://t.me/'+esc(m.telegram.replace('@',''))+'">'+esc(m.telegram)+'</a></div>';
    }
    return h+'</div>';
  }

  /* ── CREATE FRAME ── */
  function createFrame(query, blocks, isShared){
    var fresh=blocks.filter(function(b){return loaded.indexOf(b.slug)===-1});
    if(!fresh.length&&!isShared) return;

    // Activate canvas
    hero.classList.add('off');
    canvas.classList.add('on');
    bar.classList.remove('hero-mode');

    var frame=document.createElement('div');
    frame.className='frame';
    var html='';

    // Query echo
    if(query&&query!=='shared'){
      html+='<div class="frame-q">'+esc(query)+'</div>';
    }

    // Group by category
    var groups={};var order=[];
    fresh.forEach(function(b){
      if(!groups[b.category]){groups[b.category]=[];order.push(b.category)}
      groups[b.category].push(b);
      loaded.push(b.slug);cache[b.slug]=b;
    });

    // Agent intro message (based on primary category)
    var mainCat=order[0]||'formats';
    if(!isShared&&agentIntros[mainCat]){
      html+='<div class="agent-msg">'+agentIntros[mainCat]+'</div>';
    }

    // Render block grids
    order.forEach(function(cat){
      var items=groups[cat];
      var cols=items.length>=3?'g3':items.length===2?'g2':'g1';
      html+='<div class="grid '+cols+'">';
      items.forEach(function(b){html+=renderCard(b)});
      html+='</div>';
    });

    // Follow-up suggestions
    if(!isShared&&agentFollowups[mainCat]){
      html+='<div class="sugs" style="margin-top:16px;justify-content:flex-start">';
      agentFollowups[mainCat].forEach(function(s){
        html+='<button class="sg" data-q="'+esc(s)+'">'+esc(s)+'</button>';
      });
      html+='</div>';
    }

    frame.innerHTML=html;
    canvas.appendChild(frame);

    // Bind follow-up clicks
    frame.querySelectorAll('.sg').forEach(function(btn){
      btn.onclick=function(){send(btn.getAttribute('data-q'))};
    });

    updateShare();
    updateHash();

    setTimeout(function(){
      frame.scrollIntoView({behavior:'smooth',block:'start'});
    },50);
  }

  /* ── UNANSWERED FRAME ── */
  function createUnansweredFrame(query){
    hero.classList.add('off');
    canvas.classList.add('on');
    bar.classList.remove('hero-mode');

    var frame=document.createElement('div');
    frame.className='frame';
    frame.innerHTML='<div class="frame-q">'+esc(query)+'</div>'+
      '<div class="agent-msg">Хм, я пока <strong>не знаю точного ответа</strong> на этот вопрос. '+
      'Я записал его — команда LABS67 разберётся и добавит информацию. '+
      'Пока могу помочь с тем, что знаю:</div>'+
      '<div class="sugs" style="justify-content:flex-start">'+
      '<button class="sg" data-q="форматы франшизы">форматы</button>'+
      '<button class="sg" data-q="сколько стоит">цены</button>'+
      '<button class="sg" data-q="условия">условия</button>'+
      '<button class="sg" data-q="технологии">технологии</button>'+
      '<button class="sg" data-q="контакты">контакты</button>'+
      '</div>';
    canvas.appendChild(frame);
    frame.querySelectorAll('.sg').forEach(function(btn){
      btn.onclick=function(){send(btn.getAttribute('data-q'))};
    });
    apiPost('franchise_unanswered',{question:query,matched_count:0,session_id:sid});
    setTimeout(function(){frame.scrollIntoView({behavior:'smooth',block:'start'})},50);
  }

  /* ── THINKING INDICATOR ── */
  function showThinking(){
    var t=document.createElement('div');
    t.className='frame';t.id='thinking';
    t.innerHTML='<div class="thinking"><span></span><span></span><span></span></div>';
    canvas.appendChild(t);
    canvas.classList.add('on');
  }
  function hideThinking(){var t=document.getElementById('thinking');if(t)t.remove()}

  /* ── SEND ── */
  function send(q){
    q=(q||'').trim();if(!q) return;
    qi.value='';qi.focus();

    hero.classList.add('off');
    bar.classList.remove('hero-mode');
    showThinking();

    search(q).then(function(blocks){
      hideThinking();
      if(blocks&&blocks.length){
        createFrame(q,blocks,false);
      } else {
        createUnansweredFrame(q);
      }
    }).catch(function(){
      hideThinking();
      createUnansweredFrame(q);
    });
  }

  /* ── SHARE / HASH ── */
  function updateShare(){
    var n=loaded.length;
    if(!n) return;
    document.getElementById('sc').textContent=n+' блок'+(n===1?'':n<5?'а':'ов');
    shareEl.classList.add('on');
  }
  function updateHash(){if(loaded.length) window.location.hash=loaded.join(',')}
  window.doShare=function(){
    var u=location.origin+location.pathname+'#'+loaded.join(',');
    navigator.clipboard.writeText(u).then(function(){
      var b=shareEl.querySelector('button');b.textContent='✓ скопировано';
      setTimeout(function(){b.textContent='скопировать ссылку'},2000);
    });
  };
  function loadHash(){
    var h=window.location.hash.replace('#','');if(!h) return;
    var slugs=h.split(',').filter(Boolean);if(!slugs.length) return;
    var f=slugs.map(function(s){return 'slug.eq.'+s}).join(',');
    api('franchise_blocks','select=*&or=('+f+')&is_active=eq.true').then(function(blocks){
      if(blocks&&blocks.length){
        blocks.sort(function(a,b){return slugs.indexOf(a.slug)-slugs.indexOf(b.slug)});
        createFrame('shared',blocks,true);
      }
    });
  }

  /* ── EVENTS ── */
  document.getElementById('qgo').onclick=function(){send(qi.value)};
  qi.onkeydown=function(e){if(e.key==='Enter')send(qi.value)};
  document.getElementById('sugs').onclick=function(e){
    var b=e.target.closest('.sg');if(b) send(b.getAttribute('data-q'));
  };

  loadHash();
})();
</script>
